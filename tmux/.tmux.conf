# remap prefix
unbind C-b
set-option -g prefix C-g
bind-key C-g send-prefix

# vim compatability
set -sg escape-time 0
set-option -g default-terminal "screen-256color"
set-option -g focus-events on
set-option -ag terminal-overrides ',xterm-256color:RGB'

# humans can't count
set -g base-index 1

# source
bind r source-file ~/.tmux.conf

# vim-like pane switching
bind -r C-k select-pane -U
bind -r C-j select-pane -D
bind -r C-h select-pane -L
bind -r C-l select-pane -R

# switching windows
bind -r C-[ previous-window
bind -r C-] next-window
bind -r C-h previous-window
bind -r C-l next-window

# mouse control
set -g mouse on

set -g default-shell $SHELL

# catppuccin
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#89dceb"
thm_black="#181825"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f5c2e7"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#585b70"

set-option -g status-style bg="$thm_bg",fg="$thm_fg"
set-window-option -g window-status-separator ""
set-option -g status-left "#[bg=$thm_blue,bold,fg=$thm_black] #S "
set-option -g status-right "#[bg=$thm_blue,bold,fg=$thm_black]#(date +\" %a, %b %d %I:%M %p \")"
set-option -g window-status-format " #I:#W "
set-option -g window-status-current-format "#[bg=$thm_black4,fg=$thm_fg] #I:#W "

# keybinds
bind-key -r f run-shell "tmux neww ~/tmux-sessionizer"

